version: '3.8'

services:
  aizasy-api:
    build: .
    container_name: aizasy-kernel-gateway
    restart: always
    ports:
      - "8080:8080"
    
    # 【核心：赋予容器操作内核网卡的权限】
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      
    volumes:
      # 持久化 WARP 配置文件
      - warp-data:/etc/wireguard
      
    # 突破文件句柄限制
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
        
    # 注入高并发内核参数 + WireGuard 路由必须参数
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1 # wg-quick 在 Docker 内必须项
      - net.core.somaxconn=65535
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.ip_local_port_range=1024 65000
      - net.ipv4.tcp_keepalive_time=600
      - net.ipv4.tcp_max_syn_backlog=65535

volumes:
  warp-data:
