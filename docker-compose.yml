version: '3.8'

services:
  # 服务 1：全自动 WARP 洗白代理 (自动生成配置并提供 SOCKS5)
  warp-proxy:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: aizasy-warp
    restart: always
    volumes:
      # 挂载魔法启动脚本
      - ./warp-entrypoint.sh:/entrypoint.sh
      # 持久化保存生成的 config.json，防止重启丢失
      - warp-data:/etc/sing-box
    # 覆盖默认启动命令，先执行我们的脚本
    entrypoint:["/bin/sh", "/entrypoint.sh"]

  # 服务 2：Go 极速数据管道 (保持不变)
  aizasy-api:
    build: .
    container_name: aizasy-go-api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - warp-proxy
    environment:
      - SOCKS5_PROXY=warp-proxy:1080 
    
    # 突破内核封印 (极其关键，隔离生效)
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.ip_local_port_range=1024 65000
      - net.ipv4.tcp_keepalive_time=600
      - net.ipv4.tcp_max_syn_backlog=65535

# 声明本地数据卷，用于保存 CF 账户凭证
volumes:
  warp-data:
